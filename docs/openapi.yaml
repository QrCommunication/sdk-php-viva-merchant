  # ============================================================
  # Enums
  # ============================================================
  /Enums/Environment:
    get:
      tags: [Enums]
      operationId: Enum_Environment
      summary: "Environment::DEMO | Environment::PRODUCTION"
      description: |
        Enum PHP pour l'environnement Viva Wallet.

        ```php
        use QrCommunication\VivaMerchant\Enums\Environment;

        $env = Environment::DEMO;
        $env = Environment::PRODUCTION;
        $env = Environment::from('demo'); // Depuis une string

        echo $env->value;         // 'demo'
        echo $env->apiUrl();      // 'https://demo-api.vivapayments.com'
        echo $env->legacyUrl();   // 'https://demo.vivapayments.com'
        echo $env->checkoutUrl(); // 'https://demo.vivapayments.com/web/checkout'
        echo $env->accountsUrl(); // 'https://demo-accounts.vivapayments.com'
        ```

        | Valeur | apiUrl | legacyUrl |
        |--------|--------|-----------|
        | `demo` | `demo-api.vivapayments.com` | `demo.vivapayments.com` |
        | `production` | `api.vivapayments.com` | `www.vivapayments.com` |
      responses:
        '200':
          description: Enum Environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentEnum'

  /Enums/Currency:
    get:
      tags: [Enums]
      operationId: Enum_Currency
      summary: "Currency::EUR | Currency::GBP | ..."
      description: |
        Enum PHP pour les devises (codes ISO 4217 numériques).

        ```php
        use QrCommunication\VivaMerchant\Enums\Currency;

        $eur = Currency::EUR;
        echo $eur->value;     // 978
        echo $eur->iso();     // 'EUR'

        $gbp = Currency::fromIso('GBP');
        echo $gbp->value;     // 826
        ```

        | Devise | Code numérique | Enum |
        |--------|---------------|------|
        | EUR | 978 | `Currency::EUR` |
        | GBP | 826 | `Currency::GBP` |
        | USD | 840 | `Currency::USD` |
        | PLN | 985 | `Currency::PLN` |
        | RON | 946 | `Currency::RON` |
        | BGN | 975 | `Currency::BGN` |
        | CZK | 203 | `Currency::CZK` |
        | HRK | 191 | `Currency::HRK` |
        | HUF | 348 | `Currency::HUF` |
        | DKK | 208 | `Currency::DKK` |
        | SEK | 752 | `Currency::SEK` |
        | NOK | 578 | `Currency::NOK` |
      responses:
        '200':
          description: Enum Currency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyEnum'

  /Enums/TransactionStatus:
    get:
      tags: [Enums]
      operationId: Enum_TransactionStatus
      summary: "TransactionStatus::FINALIZED | ::PENDING | ..."
      description: |
        Enum PHP pour les statuts de transaction Viva Wallet.

        ```php
        use QrCommunication\VivaMerchant\Enums\TransactionStatus;

        $status = TransactionStatus::from('F');
        echo $status->label();        // 'Finalized'
        echo $status->isSuccessful();  // true
        echo $status->isPending();     // false
        echo $status->isFailed();      // false
        ```

        | Valeur | Constante | Label | Catégorie |
        |--------|-----------|-------|-----------|
        | `F` | `FINALIZED` | Finalized | Succès |
        | `A` | `PENDING` | Pending | En cours |
        | `C` | `CLEARING` | Clearing | En cours |
        | `E` | `ERROR` | Error | Échec |
        | `M` | `MANUALLY_REVERSED` | Reversed | Échec |
        | `X` | `REQUIRES_ACTION` | Requires Action | — |
        | `R` | `REFUNDED` | Refunded | — |

        **Méthodes utilitaires :**
        - `isSuccessful()` → `true` si `FINALIZED`
        - `isPending()` → `true` si `PENDING` ou `CLEARING`
        - `isFailed()` → `true` si `ERROR` ou `MANUALLY_REVERSED`
        - `label()` → label lisible en anglais
      responses:
        '200':
          description: Enum TransactionStatus
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStatusEnum'

  # ============================================================
  # Exceptions
  # ============================================================
  /Exceptions/VivaException:
    get:
      tags: [Exceptions]
      operationId: Exception_VivaException
      summary: "VivaException — classe de base"
      description: |
        Classe de base pour toutes les exceptions du SDK. Étend `RuntimeException`.

        ```php
        use QrCommunication\VivaMerchant\Exceptions\VivaException;

        try {
            $viva->orders->create(amount: 0);
        } catch (VivaException $e) {
            echo $e->getMessage();     // Message d'erreur
            echo $e->httpStatus;       // Code HTTP (400, 401, 404, etc.)
            echo $e->responseBody;     // Réponse JSON brute (array|null)
            echo $e->getErrorCode();   // ErrorCode Viva (int|null)
            echo $e->getErrorText();   // ErrorText Viva (string|null)
        }
        ```

        **Propriétés :**
        - `httpStatus` (`int`) — Code HTTP de la réponse
        - `responseBody` (`?array`) — Corps JSON décodé de la réponse Viva

        **Méthodes :**
        - `getErrorCode(): ?int` — Code d'erreur Viva
        - `getErrorText(): ?string` — Message d'erreur Viva
      responses:
        '200':
          description: Classe VivaException

  /Exceptions/AuthenticationException:
    get:
      tags: [Exceptions]
      operationId: Exception_AuthenticationException
      summary: "AuthenticationException — échec OAuth2"
      description: |
        Levée quand l'authentification OAuth2 échoue (identifiants invalides, token expiré non renouvelable).

        ```php
        use QrCommunication\VivaMerchant\Exceptions\AuthenticationException;

        try {
            $viva->account->info();
        } catch (AuthenticationException $e) {
            echo $e->getMessage(); // 'OAuth2 authentication failed: ...'
            // httpStatus = 401
        }
        ```
      responses:
        '200':
          description: Classe AuthenticationException

  /Exceptions/ValidationException:
    get:
      tags: [Exceptions]
      operationId: Exception_ValidationException
      summary: "ValidationException — erreur de validation"
      description: |
        Levée quand l'API retourne une erreur de validation (422).

        ```php
        use QrCommunication\VivaMerchant\Exceptions\ValidationException;

        try {
            // ...
        } catch (ValidationException $e) {
            echo $e->errors;
            // ['amount' => ['Amount must be positive'], ...]
        }
        ```

        **Propriétés :**
        - `errors` (`array<string, string[]>`) — Erreurs par champ
      responses:
        '200':
          description: Classe ValidationException

components:
  schemas:
    # VivaClient
    VivaClientConstructorParams:
      type: object
      required: [merchantId, apiKey, clientId, clientSecret]
      properties:
        merchantId:
          type: string
          format: uuid
          description: "Merchant UUID — Dashboard Viva > Settings > API Access"
        apiKey:
          type: string
          description: "API Key — Dashboard Viva > Settings > API Access"
        clientId:
          type: string
          description: "OAuth Client ID — format `xxx.apps.vivapayments.com`"
        clientSecret:
          type: string
          description: OAuth Client Secret
        environment:
          type: string
          enum: [demo, production]
          default: demo
          description: "Environnement (`'demo'` ou `'production'`, ou `Environment` enum)"

    VivaClientInstance:
      type: object
      description: |
        Instance `VivaClient` avec les propriétés `readonly` suivantes :
      properties:
        orders:
          type: string
          description: "`Orders` — `$viva->orders`"
        transactions:
          type: string
          description: "`Transactions` — `$viva->transactions`"
        sources:
          type: string
          description: "`Sources` — `$viva->sources`"
        wallets:
          type: string
          description: "`Wallets` — `$viva->wallets`"
        bankAccounts:
          type: string
          description: "`BankAccounts` — `$viva->bankAccounts`"
        webhooks:
          type: string
          description: "`Webhooks` — `$viva->webhooks`"
        account:
          type: string
          description: "`Account` — `$viva->account`"
        nativeCheckout:
          type: string
          description: "`NativeCheckout` — `$viva->nativeCheckout`"
        dataServices:
          type: string
          description: "`DataServices` — `$viva->dataServices`"

    Config:
      type: object
      properties:
        merchantId:
          type: string
        apiKey:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
        environment:
          $ref: '#/components/schemas/EnvironmentEnum'
      description: |
        Objet de configuration interne.

        **Méthodes :**
        - `apiUrl(): string`
        - `legacyUrl(): string`
        - `checkoutUrl(): string`
        - `accountsUrl(): string`
        - `isProduction(): bool`

    # Orders
    OrdersCreateParams:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          description: "Montant en centimes (`1500` = 15,00 EUR)"
          example: 1500
        customerDescription:
          type: string
          nullable: true
          description: Description affichée au client dans le checkout
          example: Consultation naturopathie
        merchantReference:
          type: string
          nullable: true
          description: Référence interne (apparaît dans les exports)
          example: session_123
        sourceCode:
          type: string
          nullable: true
          description: "Code source de paiement (`null` = source par défaut)"
        allowRecurring:
          type: boolean
          default: false
          description: Autoriser la tokenisation de la carte pour les charges récurrentes
        preauth:
          type: boolean
          default: false
          description: "Pré-autorisation uniquement (capturer plus tard avec `transactions->capture()`)"
        maxInstallments:
          type: integer
          default: 0
          description: "Nombre max de versements (`0` = désactivé)"

    OrdersCreateResult:
      type: object
      properties:
        order_code:
          type: integer
          description: Code unique de l'ordre Viva
          example: 1234567890
        checkout_url:
          type: string
          format: uri
          description: URL Smart Checkout pour rediriger le client
          example: "https://demo.vivapayments.com/web/checkout?ref=1234567890"

    # Sources
    SourcesCreateParams:
      type: object
      required: [name, sourceCode]
      properties:
        name:
          type: string
          description: Nom d'affichage de la source
          example: Mon site web
        sourceCode:
          type: string
          description: Code source à 4 chiffres
          example: "1234"
        domain:
          type: string
          nullable: true
          description: Domaine du site web
          example: www.example.com
        pathSuccess:
          type: string
          nullable: true
          description: Chemin de redirection après paiement réussi
          example: /paiement/succes
        pathFail:
          type: string
          nullable: true
          description: Chemin de redirection après paiement échoué
          example: /paiement/echec

    # Wallets
    WalletBalance:
      type: object
      properties:
        available:
          type: number
          format: float
          description: Solde disponible
          example: 150.50
        pending:
          type: number
          format: float
          description: Solde en attente
          example: 25.00
        reserved:
          type: number
          format: float
          description: Solde réservé
          example: 0.00
        currency:
          type: string
          description: Code devise ISO 4217
          example: EUR

    WalletTransferParams:
      type: object
      required: [amount, sourceWalletId, targetWalletId]
      properties:
        amount:
          type: integer
          description: Montant en centimes
          example: 5000
        sourceWalletId:
          type: string
          format: uuid
          description: UUID du portefeuille source
        targetWalletId:
          type: string
          format: uuid
          description: UUID du portefeuille cible
        description:
          type: string
          nullable: true
          description: Description du transfert
          example: Transfert mensuel

    WalletDetailed:
      type: object
      properties:
        iban:
          type: string
          description: IBAN du portefeuille
        walletId:
          type: integer
          description: ID numérique du portefeuille
        amount:
          type: number
          format: float
          description: Solde actuel
        isPrimary:
          type: boolean
          description: Portefeuille principal ?
        currencyCode:
          type: string
          description: Code devise ISO 4217
        friendlyName:
          type: string
          nullable: true
          description: Nom d'affichage

    # BankAccounts
    BankAccountLinkParams:
      type: object
      required: [iban, beneficiaryName]
      properties:
        iban:
          type: string
          description: IBAN du compte bancaire
          example: FR7630006000011234567890189
        beneficiaryName:
          type: string
          description: Nom du titulaire du compte
          example: Jean Dupont
        friendlyName:
          type: string
          nullable: true
          description: Nom d'affichage optionnel
          example: Compte principal

    BankAccountLinkResult:
      type: object
      properties:
        bankAccountId:
          type: string
          format: uuid
          description: UUID du compte bancaire lié
        isVivaIban:
          type: boolean
          description: "L'IBAN appartient-il à un compte Viva interne ?"

    BankAccountFeeCommandParams:
      type: object
      required: [bankAccountId, amount, walletId]
      properties:
        bankAccountId:
          type: string
          format: uuid
          description: UUID du compte bancaire lié
        amount:
          type: integer
          description: Montant en centimes
          example: 10000
        walletId:
          type: string
          description: UUID du portefeuille source
        isInstant:
          type: boolean
          default: false
          description: SEPA instantané ?
        instructionType:
          type: string
          enum: [SHA, OUR]
          default: SHA
          description: "Type d'instruction de frais (SHA = partagés, OUR = à notre charge)"

    BankAccountFeeCommandResult:
      type: object
      properties:
        bankCommandId:
          type: string
          description: "ID de la commande de frais (à passer à `send()`)"
        fee:
          type: integer
          description: Frais en centimes

    BankAccountSendParams:
      type: object
      required: [bankAccountId, amount, walletId]
      properties:
        bankAccountId:
          type: string
          format: uuid
          description: UUID du compte bancaire lié
        amount:
          type: integer
          description: Montant en centimes
          example: 10000
        walletId:
          type: string
          description: UUID du portefeuille source
        bankCommandId:
          type: string
          nullable: true
          description: "ID de la commande de frais (optionnel, obtenu via `feeCommand()`)"
        description:
          type: string
          nullable: true
          description: Description du virement

    BankAccountSendResult:
      type: object
      properties:
        commandId:
          type: string
          description: UUID du virement
        isInstant:
          type: boolean
          description: Virement instantané ?
        fee:
          type: integer
          description: Frais en centimes

    # NativeCheckout
    NativeCheckoutChargeTokenParams:
      type: object
      required: [amount, paymentData]
      properties:
        amount:
          type: integer
          description: Montant en centimes
          example: 1500
        paymentData:
          type: string
          description: Données de paiement Apple Pay / Google Pay (string encodée)
        paymentMethod:
          type: string
          enum: [applepay, googlepay]
          default: applepay
          description: "Méthode de paiement (`'applepay'` ou `'googlepay'`)"
        sourceCode:
          type: string
          nullable: true
          description: Code source de paiement
        dynamicDescriptor:
          type: string
          nullable: true
          description: Descripteur dynamique pour la charge

    NativeCheckoutChargeTokenResult:
      type: object
      properties:
        chargeToken:
          type: string
          description: "Token à usage unique pour `createTransaction()`"
        redirectToACSForm:
          type: string
          nullable: true
          description: Formulaire de redirection 3D Secure (si applicable)

    NativeCheckoutTransactionParams:
      type: object
      required: [chargeToken, amount]
      properties:
        chargeToken:
          type: string
          description: "Token obtenu via `createChargeToken()`"
        amount:
          type: integer
          description: Montant en centimes
          example: 1500
        currencyCode:
          type: integer
          default: 978
          description: "Code devise ISO 4217 numérique (`978` = EUR)"
        sourceCode:
          type: string
          nullable: true
          description: Code source de paiement
        merchantTrns:
          type: string
          nullable: true
          description: Référence interne
        customerTrns:
          type: string
          nullable: true
          description: Description affichée au client
        preauth:
          type: boolean
          default: false
          description: Pré-autorisation uniquement ?
        tipAmount:
          type: integer
          default: 0
          description: Pourboire en centimes
        installments:
          type: integer
          nullable: true
          description: "Nombre de versements (`null` = désactivé)"

    NativeCheckoutTransactionResult:
      type: object
      properties:
        transactionId:
          type: string
          format: uuid
          description: UUID de la transaction
        statusId:
          type: string
          description: "Statut (`'F'` = finalisée)"
        amount:
          type: integer
          description: Montant en centimes
        orderCode:
          type: integer
          description: Code de l'ordre

    # DataServices
    DataServicesSubscription:
      type: object
      properties:
        subscriptionId:
          type: string
          format: uuid
          description: UUID de la souscription
        url:
          type: string
          format: uri
          description: URL du webhook
        eventType:
          type: string
          description: Type d'événement

    # Webhooks
    WebhookVerificationResponse:
      type: object
      properties:
        StatusCode:
          type: integer
          example: 0
        Key:
          type: string
          description: Clé de vérification
          example: votre-verification-key

    WebhookParsedEvent:
      type: object
      properties:
        event_type:
          type: string
          description: "Type d'événement lisible (ex: `transaction.payment.created`)"
          example: transaction.payment.created
        event_type_id:
          type: integer
          description: ID numérique du type d'événement Viva
          example: 1796
        event_data:
          type: object
          description: Données de l'événement (structure variable selon le type)

    WebhookEventTypes:
      type: object
      description: |
        Les 21 types d'événements webhook supportés :

        | ID | Type |
        |----|------|
        | 1796 | `transaction.payment.created` |
        | 1797 | `transaction.refund.created` |
        | 1798 | `transaction.payment.cancelled` |
        | 1799 | `transaction.reversal.created` |
        | 1800 | `transaction.preauth.created` |
        | 1801 | `transaction.preauth.completed` |
        | 1802 | `transaction.preauth.cancelled` |
        | 1810 | `pos.session.created` |
        | 1811 | `pos.session.failed` |
        | 1812 | `transaction.price.calculated` |
        | 1813 | `transaction.failed` |
        | 1819 | `account.connected` |
        | 1820 | `account.verification.status.changed` |
        | 1821 | `account.transaction.created` |
        | 1822 | `command.bank.transfer.created` |
        | 1823 | `command.bank.transfer.executed` |
        | 1824 | `transfer.created` |
        | 1825 | `obligation.created` |
        | 1826 | `obligation.captured` |
        | 1827 | `order.updated` |
        | 1828 | `sale.transactions.file` |

    # Enums
    EnvironmentEnum:
      type: string
      enum: [demo, production]
      description: |
        `QrCommunication\VivaMerchant\Enums\Environment`

        Backed enum PHP 8.1+ avec valeurs string.

    CurrencyEnum:
      type: integer
      description: |
        `QrCommunication\VivaMerchant\Enums\Currency`

        Backed enum PHP 8.1+ avec valeurs int (codes ISO 4217 numériques).

    TransactionStatusEnum:
      type: string
      enum: ['F', 'A', 'C', 'E', 'M', 'X', 'R']
      description: |
        `QrCommunication\VivaMerchant\Enums\TransactionStatus`

        Backed enum PHP 8.1+ avec valeurs string.

    # Errors
    ApiError:
      type: object
      properties:
        message:
          type: string
          description: Message d'erreur
        httpStatus:
          type: integer
          description: Code HTTP
        responseBody:
          type: object
          nullable: true
          description: Réponse brute Viva
