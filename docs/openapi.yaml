        $result = $viva->bankAccounts->link(
            iban: 'FR7630006000011234567890189',
            beneficiaryName: 'Jean Dupont',
            friendlyName: 'Compte principal',
        );

        echo $result['bankAccountId']; // UUID
        echo $result['isVivaIban'];    // false (IBAN externe)
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountLinkParams'
      responses:
        '200':
          description: Compte bancaire lié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountLinkResult'

  /BankAccounts/transferOptions:
    get:
      tags: [BankAccounts]
      operationId: BankAccounts_transferOptions
      summary: "$viva->bankAccounts->transferOptions()"
      description: |
        Récupère les options de transfert disponibles (SEPA standard, SEPA instantané, frais).

        Uniquement pour les IBANs externes — pas pour les wallets Viva internes.

        ```php
        $options = $viva->bankAccounts->transferOptions('bank-account-uuid');
        ```
