                type: object

  # ============================================================
  # NativeCheckout
  # ============================================================
  /NativeCheckout/createChargeToken:
    post:
      tags: [NativeCheckout]
      operationId: NativeCheckout_createChargeToken
      summary: "$viva->nativeCheckout->createChargeToken()"
      description: |
        Génère un token de charge à usage unique à partir des données Apple Pay ou Google Pay.

        ```php
        $token = $viva->nativeCheckout->createChargeToken(
            amount: 1500,
            paymentData: $applePayPaymentDataString,
            paymentMethod: 'applepay',  // ou 'googlepay'
            sourceCode: '1234',
        );

        echo $token['chargeToken'];         // Token à passer à createTransaction()
        echo $token['redirectToACSForm'];    // Formulaire 3DS (si applicable)
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NativeCheckoutChargeTokenParams'
      responses:
        '200':
          description: Token de charge généré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeCheckoutChargeTokenResult'

  /NativeCheckout/createTransaction:
    post:
      tags: [NativeCheckout]
      operationId: NativeCheckout_createTransaction
      summary: "$viva->nativeCheckout->createTransaction()"
      description: |
        Exécute une transaction à partir d'un token de charge obtenu via `createChargeToken()`.

        ```php
        $txn = $viva->nativeCheckout->createTransaction(
            chargeToken: $token['chargeToken'],
            amount: 1500,
            currencyCode: 978,             // EUR (ISO 4217 numérique)
            sourceCode: '1234',
            merchantTrns: 'ref_123',       // Référence interne
            customerTrns: 'Consultation',  // Affiché au client
            preauth: false,
            tipAmount: 0,
            installments: null,
        );

        echo $txn['transactionId']; // UUID
        echo $txn['statusId'];      // 'F' = finalisée
        echo $txn['amount'];        // 1500
        echo $txn['orderCode'];     // Code de l'ordre
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NativeCheckoutTransactionParams'
      responses:
        '200':
          description: Transaction créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeCheckoutTransactionResult'

