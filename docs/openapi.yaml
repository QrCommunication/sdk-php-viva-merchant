  # ============================================================
  # Webhooks
  # ============================================================
  /Webhooks/verificationResponse:
    get:
      tags: [Webhooks]
      operationId: Webhooks_verificationResponse
      summary: "$viva->webhooks->verificationResponse()"
      description: |
        Génère la réponse de vérification pour le GET de confirmation envoyé par Viva.

        Quand vous configurez un webhook dans le Dashboard Viva, Viva envoie un GET pour vérifier que l'URL est accessible. Vous devez répondre avec votre clé de vérification.

        ```php
        // Dans votre contrôleur (Laravel) :
        public function handleVivaWebhookVerification(Request $request)
        {
            $response = $viva->webhooks->verificationResponse('votre-verification-key');

            return response()->json($response);
            // => {"StatusCode": 0, "Key": "votre-verification-key"}
        }
        ```
      parameters:
        - name: verificationKey
          in: query
          required: true
          schema:
            type: string
          description: Clé de vérification (Dashboard Viva > Webhooks)
      responses:
        '200':
          description: Réponse de vérification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookVerificationResponse'

  /Webhooks/parse:
    post:
      tags: [Webhooks]
      operationId: Webhooks_parse
      summary: "$viva->webhooks->parse()"
      description: |
        Parse le payload JSON d'un webhook POST envoyé par Viva.

        ```php
        // Dans votre contrôleur (Laravel) :
        public function handleVivaWebhook(Request $request)
        {
            $event = $viva->webhooks->parse($request->getContent());

            echo $event['event_type'];     // 'transaction.payment.created'
            echo $event['event_type_id'];  // 1796
            echo $event['event_data'];     // Données de l'événement

            match ($event['event_type']) {
                'transaction.payment.created' => $this->handlePayment($event['event_data']),
                'transaction.refund.created'  => $this->handleRefund($event['event_data']),
                default => null,
            };
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rawBody]
              properties:
                rawBody:
                  type: string
                  description: Corps JSON brut du POST webhook
      responses:
        '200':
          description: Événement parsé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookParsedEvent'
        '400':
          description: "`InvalidArgumentException` — JSON invalide"

  /Webhooks/isKnownEvent:
    get:
      tags: [Webhooks]
      operationId: Webhooks_isKnownEvent
      summary: "$viva->webhooks->isKnownEvent()"
      description: |
        Vérifie si un ID de type d'événement est reconnu par le SDK.

        ```php
        $viva->webhooks->isKnownEvent(1796); // true (transaction.payment.created)
        $viva->webhooks->isKnownEvent(9999); // false
        ```
      parameters:
        - name: eventTypeId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: "`bool`"
          content:
            application/json:
              schema:
                type: boolean

  /Webhooks/eventTypeIds:
    get:
