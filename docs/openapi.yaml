      responses:
        '200':
          description: Options de transfert disponibles
          content:
            application/json:
              schema:
                type: object
                description: "Types d'instruction disponibles (SHA, OUR, instant)"

  /BankAccounts/feeCommand:
    post:
      tags: [BankAccounts]
      operationId: BankAccounts_feeCommand
      summary: "$viva->bankAccounts->feeCommand()"
      description: |
        Crée une commande de frais pour vérifier le coût d'un virement avant exécution.

        ```php
        $fees = $viva->bankAccounts->feeCommand(
            bankAccountId: 'bank-account-uuid',
            amount: 10000,                    // 100,00 EUR
            walletId: 'source-wallet-uuid',
            isInstant: true,                  // SEPA instantané
            instructionType: 'SHA',           // Frais partagés
        );

        echo $fees['bankCommandId']; // À passer à send()
        echo $fees['fee'];           // Frais en centimes
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountFeeCommandParams'
      responses:
        '200':
          description: Commande de frais créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountFeeCommandResult'

  /BankAccounts/send:
    post:
      tags: [BankAccounts]
      operationId: BankAccounts_send
      summary: "$viva->bankAccounts->send()"
      description: |
        Exécute un virement SEPA vers un compte bancaire lié.

        ```php
        $result = $viva->bankAccounts->send(
            bankAccountId: 'bank-account-uuid',
            amount: 10000,
            walletId: 'source-wallet-uuid',
            bankCommandId: 'fee-command-uuid',  // Optionnel
            description: 'Virement mensuel',
        );

        echo $result['commandId']; // UUID du virement
        echo $result['isInstant']; // true/false
        echo $result['fee'];       // Frais en centimes
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountSendParams'
      responses:
        '200':
          description: Virement exécuté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountSendResult'

