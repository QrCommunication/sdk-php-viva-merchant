        $ids = $viva->webhooks->eventTypeIds();
        // [1796, 1797, 1798, 1799, 1800, ..., 1828]
        ```
      responses:
        '200':
          description: Liste des IDs d'événements
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

