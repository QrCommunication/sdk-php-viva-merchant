openapi: 3.1.0
info:
  title: Viva Wallet Merchant SDK for PHP
  description: |
    ## Overview

    PHP SDK wrapping the Viva Wallet Merchant API for payment operations: orders, transactions, sources, webhooks, and account management.

    This SDK communicates with **three distinct Viva Wallet hosts**:

    | Host | Authentication | SDK Methods |
    |------|---------------|-------------|
    | `accounts.vivapayments.com` | OAuth2 Client Credentials | *(internal — token acquisition)* |
    | `api.vivapayments.com` | Bearer Token | `$viva->account->info()`, `wallets()` |
    | `www.vivapayments.com` | Basic Auth (Merchant ID + API Key) | `$viva->orders->*`, `transactions->*`, `sources->*` |

    > In **demo** mode, hosts are prefixed with `demo-` / `demo.`.

    ## Authentication

    The SDK handles authentication automatically:
    - **OAuth2** tokens are cached in memory and refreshed 60 seconds before expiration.
    - **Basic Auth** credentials are sent with every Legacy API request.

    You never need to manage tokens manually.

    ## Installation

    ```bash
    composer require qrcommunication/viva-merchant-sdk
    ```

    ## Quick Start

    ```php
    use QrCommunication\VivaMerchant\VivaClient;

    $viva = new VivaClient(
        merchantId: 'your-merchant-uuid',
        apiKey: 'your-api-key',
        clientId: 'your-client-id.apps.vivapayments.com',
        clientSecret: 'your-client-secret',
        environment: 'demo',
    );

    $order = $viva->orders->create(amount: 1500);
    echo $order['checkout_url'];
    ```

    ## SDK by [QrCommunication](https://qrcommunication.com)
