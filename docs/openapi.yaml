openapi: 3.1.0
info:
  title: Viva Wallet Merchant SDK API
  version: 1.3.5
  description: |
    SDK PHP complet pour l'API Viva Wallet marchand.

    Ce SDK couvre **9 ressources** : Orders, Transactions, Sources, Wallets, BankAccounts,
    NativeCheckout (Apple Pay / Google Pay), DataServices (MT940, webhooks subscriptions),
    Account et Webhooks.

    ## Les deux APIs Viva Wallet

    | API | Host production | Auth | Convention |
    |-----|----------------|------|------------|
    | **Legacy** | `www.vivapayments.com` | Basic Auth (MerchantID:APIKey) | PascalCase |
    | **New** | `api.vivapayments.com` | Bearer OAuth2 | camelCase |

    ## Authentification

    Le SDK gère automatiquement l'authentification :
    - **Legacy API** : Basic Auth avec `merchantId` et `apiKey`
    - **New API** : OAuth2 client_credentials avec auto-refresh

    ## Montants

    Tous les montants sont en **centimes** (int). Exemple : 1500 = 15,00 EUR.
  contact:
    name: QrCommunication
    email: dev@praticonnect.com
    url: https://qrcommunication.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://demo-api.vivapayments.com
    description: Demo (sandbox)
  - url: https://api.vivapayments.com
    description: Production
  - url: https://demo.vivapayments.com
    description: Demo Legacy API
  - url: https://www.vivapayments.com
    description: Production Legacy API

tags:
  - name: Orders
    description: Smart Checkout — création d'ordres de paiement (Legacy API, Basic Auth)
  - name: Transactions
    description: Consultation, remboursement, capture et paiements récurrents (Legacy + New API)
  - name: Sources
    description: Gestion des sources de paiement (Legacy API, Basic Auth)
  - name: Wallets
    description: Portefeuilles — soldes, transferts, Account API (Legacy + New API)
  - name: BankAccounts
    description: Comptes bancaires — IBAN, virements SEPA (New API, Bearer OAuth2)
  - name: NativeCheckout
    description: Apple Pay et Google Pay — charge tokens et transactions natives (New API, Bearer OAuth2)
  - name: DataServices
    description: Reporting MT940, abonnements webhook, génération de fichiers (New API, Bearer OAuth2)
  - name: Account
    description: Informations du compte marchand (New API, Bearer OAuth2)
  - name: Webhooks
    description: Vérification et parsing des événements webhook (côté serveur, pas d'auth)

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: Legacy API — MerchantID comme username, APIKey comme password
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
      description: New API — Token obtenu via OAuth2 client_credentials

  schemas:
    # ==================== Orders ====================
    OrderCreateRequest:
      type: object
      required: [Amount]
      properties:
        Amount:
          type: integer
          description: Montant en centimes
          example: 1500
        CustomerTrns:
          type: string
          nullable: true
          description: Description affichée au client
          example: Consultation initiale
        MerchantTrns:
          type: string
          nullable: true
          description: Référence interne
          example: session_123
        SourceCode:
          type: string
          nullable: true
          description: Code source de paiement
          example: "1234"
        AllowRecurring:
          type: boolean
          default: false
          description: Autoriser la tokenisation de la carte
        IsPreAuth:
          type: boolean
          default: false
          description: Pré-autorisation uniquement
        MaxInstallments:
          type: integer
          nullable: true
          description: Nombre maximum de versements
          example: 3

    OrderCreateResponse:
      type: object
      properties:
        order_code:
          type: integer
          description: Code de l'ordre
          example: 1234567890
        checkout_url:
          type: string
          format: uri
          description: URL de checkout Smart Checkout
          example: https://demo.vivapayments.com/web/checkout?ref=1234567890

    OrderStatusResponse:
      type: object
      properties:
        OrderCode:
          type: integer
          example: 1234567890
        ErrorCode:
          type: integer
          example: 0
        ErrorText:
          type: string
          example: ""
        StateId:
          type: integer
          description: "0=Pending, 1=Expired, 2=Cancelled, 3=Paid"
          example: 3
        FullName:
          type: string
          example: Jean Dupont

    # ==================== Transactions ====================
    TransactionLegacyResponse:
      type: object
      properties:
        TransactionId:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        Amount:
          type: number
          format: float
          example: 15.00
        StatusId:
          type: string
          example: F
        OrderCode:
          type: integer
          example: 1234567890
        CurrencyCode:
          type: string
          example: EUR

    TransactionV2Response:
      type: object
      properties:
        email:
          type: string
          example: client@example.com
        amount:
          type: number
          format: float
          example: 15.00
        orderCode:
          type: integer
          example: 1234567890
        statusId:
          type: string
          example: F
        fullName:
          type: string
          example: Jean Dupont
        cardNumber:
          type: string
          description: Numéro masqué
          example: "411111XXXXXX1111"
        currencyCode:
          type: integer
          example: 978
        recurringSupport:
          type: boolean
          example: true
        cardUniqueReference:
          type: string
          example: "ref-unique-123"

    TransactionListResponse:
      type: object
      properties:
        Transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLegacyResponse'

    CancelResponse:
      type: object
      properties:
        TransactionId:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"

    CaptureRequest:
      type: object
      required: [Amount]
      properties:
        Amount:
          type: integer
          description: Montant à capturer en centimes
          example: 1500

    RecurringRequest:
      type: object
      required: [Amount]
      properties:
        Amount:
          type: integer
          description: Montant en centimes
          example: 1500
        SourceCode:
          type: string
          nullable: true
          example: "1234"

    # ==================== Sources ====================
    SourceCreateRequest:
      type: object
      required: [Name, SourceCode]
      properties:
        Name:
          type: string
          example: Mon site web
        SourceCode:
          type: string
          example: "1234"
        Domain:
          type: string
          nullable: true
          example: example.com
        PathSuccess:
          type: string
          nullable: true
          example: /payment/success
        PathFail:
          type: string
          nullable: true
          example: /payment/failed

    SourceResponse:
      type: object
      properties:
        SourceCode:
          type: string
          example: "1234"
        Name:
          type: string
          example: Mon site web
        Domain:
          type: string
          example: example.com

    # ==================== Wallets ====================
    WalletResponse:
      type: object
      properties:
        Available:
          type: number
          format: float
          example: 1500.50
        Pending:
          type: number
          format: float
          example: 200.00
        Reserved:
          type: number
          format: float
          example: 0.00
        CurrencyCode:
          type: string
          example: EUR

    WalletBalanceResponse:
      type: object
      properties:
        available:
          type: number
          format: float
          example: 1500.50
        pending:
          type: number
          format: float
          example: 200.00
        reserved:
          type: number
          format: float
          example: 0.00
        currency:
          type: string
          example: EUR

    WalletTransferRequest:
      type: object
      required: [Amount, SourceWalletId, TargetWalletId]
      properties:
        Amount:
          type: integer
          description: Montant en centimes
          example: 5000
        SourceWalletId:
          type: string
          format: uuid
        TargetWalletId:
          type: string
          format: uuid
        Description:
          type: string
          nullable: true
          example: Transfert mensuel

    WalletDetailedResponse:
      type: object
      properties:
        iban:
          type: string
          example: "GR1234567890123456789012345"
        walletId:
          type: integer
          example: 12345
        amount:
          type: number
          format: float
          example: 1500.50
        isPrimary:
          type: boolean
          example: true
        currencyCode:
          type: string
          example: EUR
        friendlyName:
          type: string
          nullable: true
          example: Compte principal

    WalletCreateRequest:
      type: object
      required: [friendlyName]
      properties:
        friendlyName:
          type: string
          example: "Épargne"
        currencyCode:
          type: string
          default: EUR
          example: EUR

    WalletUpdateRequest:
      type: object
      required: [friendlyName]
      properties:
        friendlyName:
          type: string
          example: Nouveau nom

    # ==================== BankAccounts ====================
    BankAccountLinkRequest:
      type: object
      required: [iban, beneficiaryName]
      properties:
        iban:
          type: string
          example: FR7630006000011234567890189
        beneficiaryName:
          type: string
          example: Jean Dupont
        friendlyName:
          type: string
          nullable: true
          example: Compte principal

    BankAccountLinkResponse:
      type: object
      properties:
        bankAccountId:
          type: string
          format: uuid
          example: ba-uuid-123
        isVivaIban:
          type: boolean
          example: false

    BankAccountResponse:
      type: object
      properties:
        bankAccountId:
          type: string
          format: uuid
        iban:
          type: string
          example: FR7630006000011234567890189
        beneficiaryName:
          type: string
          example: Jean Dupont
        friendlyName:
          type: string
          nullable: true
        isVivaIban:
          type: boolean

    TransferOptionsResponse:
      type: object
      properties:
        instructionTypes:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: SHA
              isInstant:
                type: boolean
                example: false
              fee:
                type: integer
                example: 150

    FeeCommandRequest:
      type: object
      required: [amount, walletId]
      properties:
        amount:
          type: integer
          description: Montant en centimes
          example: 50000
        walletId:
          type: string
          format: uuid
        isInstant:
          type: boolean
          default: false
        instructionType:
          type: string
          default: SHA
          enum: [SHA, OUR]

    FeeCommandResponse:
      type: object
      properties:
        bankCommandId:
          type: string
          format: uuid
        fee:
          type: integer
          example: 150

    BankTransferRequest:
      type: object
      required: [amount, walletId]
      properties:
        amount:
          type: integer
          description: Montant en centimes
          example: 50000
        walletId:
          type: string
          format: uuid
        bankCommandId:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
          example: Virement mensuel

    BankTransferResponse:
      type: object
      properties:
        commandId:
          type: string
          format: uuid
        isInstant:
          type: boolean
          example: false
        fee:
          type: integer
          example: 150

    # ==================== NativeCheckout ====================
    ChargeTokenRequest:
      type: object
      required: [amount, chargeData, paymentMethodId]
      properties:
        amount:
          type: integer
          description: Montant en centimes
          example: 1500
        chargeData:
          type: string
          description: Données de paiement chiffrées Apple Pay / Google Pay
          example: "<encrypted payment data>"
        paymentMethodId:
          type: integer
          description: "10 = Apple Pay, 11 = Google Pay"
          enum: [10, 11]
          example: 10
        sourceCode:
          type: string
          nullable: true
          example: "1234"
        dynamicDescriptor:
          type: string
          nullable: true
          example: "MYSHOP*Purchase"

    ChargeTokenResponse:
      type: object
      properties:
        chargeToken:
          type: string
          description: Token de charge à utiliser pour créer la transaction
          example: "ctok_abc123def456"
        redirectToACSForm:
          type: string
          nullable: true
          description: Formulaire HTML 3DS si requis

    NativeTransactionRequest:
      type: object
      required: [chargeToken, amount]
      properties:
        chargeToken:
          type: string
          example: "ctok_abc123def456"
        amount:
          type: integer
          description: Montant en centimes
          example: 1500
        currencyCode:
          type: integer
          description: Code devise ISO 4217
          default: 978
          example: 978
        sourceCode:
          type: string
          nullable: true
          example: "1234"
        merchantTrns:
          type: string
          nullable: true
          description: Référence interne
          example: "ref_123"
        customerTrns:
          type: string
          nullable: true
          description: Description visible au client
          example: "Achat en ligne"
        preauth:
          type: boolean
          default: false
          description: Pré-autorisation uniquement
        tipAmount:
          type: integer
          default: 0
          description: Pourboire en centimes
        installments:
          type: integer
          nullable: true
          default: 0
          description: Nombre de versements

    NativeTransactionResponse:
      type: object
      properties:
        transactionId:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        statusId:
          type: string
          example: F
        amount:
          type: integer
          example: 1500
        orderCode:
          type: integer
          example: 1234567890

    # ==================== DataServices ====================
    Mt940Response:
      type: object
      properties:
        data:
          type: string
          description: Données MT940 au format texte bancaire standard
          example: ":20:STARTOFDAY\n:25:VIVAWALLET/123456\n..."

    WebhookSubscriptionRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://example.com/webhooks/viva
        eventType:
          type: string
          default: SaleTransactionsFileGenerated
          example: SaleTransactionsFileGenerated

    WebhookSubscriptionResponse:
      type: object
      properties:
        subscriptionId:
          type: string
          format: uuid
          example: "sub-uuid-123"
        url:
          type: string
          format: uri
          example: https://example.com/webhooks/viva
        eventType:
          type: string
          example: SaleTransactionsFileGenerated

    FileRequestBody:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
          example: "2026-03-18"

    # ==================== Account ====================
    AccountInfoResponse:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        businessName:
          type: string
          example: Ma Boutique SAS
        email:
          type: string
          format: email
          example: contact@maboutique.com
        countryCode:
          type: string
          example: FR

    # ==================== Webhooks ====================
    WebhookVerificationResponse:
      type: object
      properties:
        StatusCode:
          type: integer
          example: 0
        Key:
          type: string
          example: your-verification-key

    WebhookPayload:
      type: object
      properties:
        EventTypeId:
          type: integer
          description: "ID de l'événement (voir table des événements)"
          example: 1796
        EventData:
          type: object
          properties:
            TransactionId:
              type: string
              format: uuid
            Amount:
              type: number
              format: float
            StatusId:
              type: string
            OrderCode:
              type: integer

    WebhookParsedResponse:
      type: object
      properties:
        event_type:
          type: string
          description: Type d'événement résolu
          example: transaction.payment.created
        event_type_id:
          type: integer
          description: ID numérique de l'événement Viva
          example: 1796
        event_data:
          type: object
          description: Données de l'événement

    # ==================== Errors ====================
    ErrorResponse:
      type: object
      properties:
        ErrorCode:
          type: integer
          example: 1
        ErrorText:
          type: string
          example: Invalid order code
        Success:
          type: boolean
          example: false

    ApiErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Unauthorized
        detail:
          type: string
          nullable: true

paths:
  # ==================== Orders ====================
  /api/orders:
    post:
      tags: [Orders]
      summary: Créer un ordre de paiement
      description: |
        Crée un ordre Smart Checkout et retourne l'URL de checkout.
        **Legacy API** — Basic Auth — PascalCase.
      operationId: createOrder
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            examples:
              simple:
                summary: Ordre simple
                value:
                  Amount: 1500
                  CustomerTrns: Consultation
              full:
                summary: Ordre complet
                value:
                  Amount: 1500
                  CustomerTrns: Consultation initiale
                  MerchantTrns: session_123
                  SourceCode: "1234"
                  AllowRecurring: true
                  IsPreAuth: false
                  MaxInstallments: 3
      responses:
        '200':
          description: Ordre créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
        '400':
          description: Erreur de création
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{orderCode}:
    get:
      tags: [Orders]
      summary: Récupérer le statut d'un ordre
      operationId: getOrder
      security:
        - BasicAuth: []
      parameters:
        - name: orderCode
          in: path
          required: true
          schema:
            type: integer
          example: 1234567890
      responses:
        '200':
          description: Statut de l'ordre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusResponse'

    delete:
      tags: [Orders]
      summary: Annuler un ordre non payé
      operationId: cancelOrder
      security:
        - BasicAuth: []
      parameters:
        - name: orderCode
          in: path
          required: true
          schema:
            type: integer
          example: 1234567890
      responses:
        '200':
          description: Ordre annulé

  # ==================== Transactions ====================
  /api/transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Détails complets d'une transaction (Legacy)
      description: |
        Retourne les détails complets de la transaction incluant Fee, Commission, Order, Payment, CreditCard.
        **Legacy API** — Basic Auth — PascalCase.
      operationId: getTransaction
      security:
        - BasicAuth: []
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLegacyResponse'

    post:
      tags: [Transactions]
      summary: Capturer un preauth ou paiement récurrent
      description: |
        Utilisé pour capturer une pré-autorisation ou déclencher un paiement récurrent.
        **Legacy API** — Basic Auth — PascalCase.
      operationId: captureOrRecurring
      security:
        - BasicAuth: []
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '200':
          description: Transaction exécutée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLegacyResponse'

    delete:
      tags: [Transactions]
      summary: Annuler / rembourser une transaction
      description: |
        Même jour = void (annulation). Jour suivant = refund (remboursement).
        **Legacy API** — Basic Auth.
      operationId: cancelTransaction
      security:
        - BasicAuth: []
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: amount
          in: query
          required: false
          schema:
            type: integer
          description: Montant en centimes (null = remboursement total)
        - name: sourceCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Transaction annulée/remboursée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'

  /api/transactions:
    get:
      tags: [Transactions]
      summary: Lister les transactions par date
      operationId: listTransactions
      security:
        - BasicAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-18"
      responses:
        '200':
          description: Liste des transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'

  /checkout/v2/transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Détails d'une transaction (New API)
      description: |
        Retourne une réponse légère en camelCase. Recommandé par Viva pour vérifier les paiements Smart Checkout.
        **New API** — Bearer OAuth2 — camelCase.
      operationId: getTransactionV2
      security:
        - BearerAuth: []
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionV2Response'

  # ==================== Sources ====================
  /api/sources:
    get:
      tags: [Sources]
      summary: Lister les sources de paiement
      operationId: listSources
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Liste des sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceResponse'

    post:
      tags: [Sources]
      summary: Créer une source de paiement
      operationId: createSource
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceCreateRequest'
      responses:
        '200':
          description: Source créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'

  # ==================== Wallets ====================
  /api/wallets:
    get:
      tags: [Wallets]
      summary: Lister les portefeuilles
      description: |
        Retourne tous les wallets du marchand avec les soldes.
        **New API** — Bearer OAuth2.
      operationId: listWallets
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste des portefeuilles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WalletResponse'

  /api/wallets/transfer:
    post:
      tags: [Wallets]
      summary: Transfert entre portefeuilles
      description: |
        Transfère des fonds entre deux wallets Viva Wallet.
        **Legacy API** — Basic Auth — PascalCase.

        Prérequis : « Allow transfers between accounts » activé dans Settings > API Access.
      operationId: transferWallet
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletTransferRequest'
      responses:
        '200':
          description: Transfert effectué

  /walletaccounts/v1/wallets:
    get:
      tags: [Wallets]
      summary: Liste détaillée des portefeuilles (Account API)
      description: |
        Réponse enrichie avec IBAN, SWIFT, friendlyName.
        **New API** — Bearer OAuth2 — camelCase.
      operationId: listWalletsDetailed
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste détaillée
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WalletDetailedResponse'

    post:
      tags: [Wallets]
      summary: Créer un sous-compte (wallet)
      operationId: createWallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletCreateRequest'
      responses:
        '201':
          description: Wallet créé
          content:
            application/json:
