  # ==================== NativeCheckout ====================
  /nativecheckout/v2/chargetokens:
    post:
      tags: [NativeCheckout]
      summary: Générer un token de charge (Apple Pay / Google Pay)
      description: |
        Convertit les données de paiement Apple Pay ou Google Pay en un token de charge à usage unique.
        Ce token est ensuite utilisé pour créer la transaction via `/nativecheckout/v2/transactions`.
        **New API** — Bearer OAuth2 — camelCase.
      operationId: createChargeToken
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargeTokenRequest'
            examples:
              applePay:
                summary: Apple Pay
                value:
                  amount: 1500
                  chargeData: "<Apple Pay encrypted data>"
                  paymentMethodId: 10
              googlePay:
                summary: Google Pay
                value:
                  amount: 1500
                  chargeData: "<Google Pay encrypted data>"
                  paymentMethodId: 11
      responses:
        '200':
          description: Token de charge généré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeTokenResponse'
        '400':
          description: Données de paiement invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /nativecheckout/v2/transactions:
    post:
      tags: [NativeCheckout]
      summary: Exécuter une transaction native (Apple Pay / Google Pay)
      description: |
        Utilise le token de charge obtenu via `/nativecheckout/v2/chargetokens` pour exécuter la transaction.
        **New API** — Bearer OAuth2 — camelCase.
      operationId: createNativeTransaction
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NativeTransactionRequest'
            examples:
              simple:
                summary: Transaction simple
                value:
                  chargeToken: "ctok_abc123def456"
                  amount: 1500
              full:
                summary: Transaction complète
                value:
                  chargeToken: "ctok_abc123def456"
                  amount: 1500
                  currencyCode: 978
                  sourceCode: "1234"
                  merchantTrns: "ref_123"
                  customerTrns: "Achat en ligne"
                  preauth: false
                  tipAmount: 0
                  installments: 0
      responses:
        '200':
          description: Transaction exécutée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeTransactionResponse'
        '400':
          description: Token invalide ou expiré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

