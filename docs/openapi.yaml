openapi: 3.1.0
info:
  title: Viva Wallet Merchant SDK — Référence PHP
  version: 1.5.1
  description: |
    Documentation de référence du SDK PHP `qrcommunication/viva-merchant-sdk`.

    Ce document décrit les **classes**, **méthodes**, **paramètres** et **types de retour**
    du SDK — pas les endpoints HTTP sous-jacents.

    ## Installation

    ```bash
    composer require qrcommunication/viva-merchant-sdk
    ```

    ## Initialisation

    ```php
    use QrCommunication\VivaMerchant\VivaClient;

    $viva = new VivaClient(
        merchantId: 'votre-uuid',
        apiKey: 'votre-api-key',
        clientId: 'xxx.apps.vivapayments.com',
        clientSecret: 'votre-secret',
        environment: 'demo', // ou 'production'
    );
    ```

    ## Ressources disponibles

    | Propriété | Classe | Description |
    |-----------|--------|-------------|
    | `$viva->orders` | `Orders` | Ordres de paiement Smart Checkout |
    | `$viva->transactions` | `Transactions` | Consultation, remboursement, capture, récurrent |
    | `$viva->sources` | `Sources` | Sources de paiement |
    | `$viva->wallets` | `Wallets` | Portefeuilles, soldes, transferts |
    | `$viva->bankAccounts` | `BankAccounts` | Comptes bancaires IBAN, virements SEPA |
    | `$viva->nativeCheckout` | `NativeCheckout` | Apple Pay / Google Pay |
    | `$viva->dataServices` | `DataServices` | Rapports MT940, souscriptions webhook |
    | `$viva->webhooks` | `Webhooks` | Vérification et parsing des webhooks |
    | `$viva->account` | `Account` | Informations du compte marchand |

    ## Montants

    Tous les montants sont en **centimes** (`int`). Exemple : `1500` = 15,00 EUR.

    ## Gestion d'erreurs

    Le SDK lève des exceptions typées :

    | Exception | Quand |
    |-----------|-------|
    | `AuthenticationException` | Échec OAuth2 (identifiants invalides) |
    | `ApiException` | Erreur retournée par l'API Viva (4xx, 5xx) |
    | `ValidationException` | Erreur de validation (422) |
    | `VivaException` | Classe de base pour toutes les exceptions SDK |

    ```php
    use QrCommunication\VivaMerchant\Exceptions\ApiException;
    use QrCommunication\VivaMerchant\Exceptions\AuthenticationException;

    try {
        $order = $viva->orders->create(amount: 1500);
    } catch (AuthenticationException $e) {
        // Identifiants invalides
    } catch (ApiException $e) {
        echo $e->httpStatus;    // 400, 404, etc.
        echo $e->responseBody;  // Réponse brute Viva
        echo $e->getErrorCode();
        echo $e->getErrorText();
    }
    ```
  contact:
    name: QrCommunication
    email: contact@qrcommunication.com
    url: https://qrcommunication.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

tags:
  - name: VivaClient
    description: |
      Point d'entrée du SDK — instanciation, test de connexion, gestion du token.

      ```php
      use QrCommunication\VivaMerchant\VivaClient;
      ```
  - name: Orders
    description: |
      `$viva->orders` — Ordres de paiement Smart Checkout.

      Crée des ordres de paiement, récupère leur statut, génère les URLs de checkout.

      ```php
      $order = $viva->orders->create(amount: 1500, customerDescription: 'Consultation');
      // Rediriger le client vers $order['checkout_url']
      ```
  - name: Transactions
    description: |
      `$viva->transactions` — Consultation, remboursement, capture et paiements récurrents.

      ```php
      $txn = $viva->transactions->get('uuid');
      $viva->transactions->cancel('uuid', amount: 500);
      $viva->transactions->capture('uuid', amount: 1500);
      $viva->transactions->recurring('initial-uuid', amount: 1500);
      ```
  - name: Sources
    description: |
      `$viva->sources` — Gestion des sources de paiement.

      Les sources définissent les domaines autorisés et les URLs de redirection après paiement.
  - name: Wallets
    description: |
      `$viva->wallets` — Portefeuilles, soldes et transferts.

      Gère les sous-comptes (wallets) du marchand, consulte les soldes et effectue des transferts entre wallets.
  - name: BankAccounts
    description: |
      `$viva->bankAccounts` — Comptes bancaires et virements SEPA.

      Lie des IBANs, vérifie les options de transfert, calcule les frais et exécute des virements.
  - name: NativeCheckout
    description: |
      `$viva->nativeCheckout` — Paiements Apple Pay et Google Pay.

      Génère des tokens de charge à partir des données Apple Pay / Google Pay, puis exécute les transactions.
  - name: DataServices
    description: |
      `$viva->dataServices` — Rapports MT940 et souscriptions webhook.

      Récupère les relevés bancaires au format MT940 et gère les souscriptions aux événements de fichiers.
  - name: Webhooks
    description: |
      `$viva->webhooks` — Vérification et parsing des webhooks Viva Wallet.

      Gère la vérification GET et le parsing des événements POST. 21 types d'événements supportés.
  - name: Account
    description: |
      `$viva->account` — Informations du compte marchand.

      Récupère les détails du compte et les soldes des portefeuilles.
  - name: Enums
    description: |
      Enums PHP 8.1+ fournis par le SDK pour le typage strict.

      - `Environment` — `demo` | `production`
      - `Currency` — Codes ISO 4217 numériques (978 = EUR, 826 = GBP, etc.)
      - `TransactionStatus` — Statuts de transaction (`F`, `A`, `C`, `E`, `M`, `X`, `R`)
  - name: Exceptions
    description: |
      Hiérarchie d'exceptions du SDK.

      ```
      RuntimeException
      └── VivaException
          ├── ApiException
          ├── AuthenticationException
          └── ValidationException
      ```

paths:
  # ============================================================
  # VivaClient
  # ============================================================
  /VivaClient/__construct:
    post:
      tags: [VivaClient]
      operationId: VivaClient__construct
      summary: new VivaClient(...)
      description: |
        Instancie le client SDK. L'authentification OAuth2 est automatique au premier appel API.

        ```php
        use QrCommunication\VivaMerchant\VivaClient;
        use QrCommunication\VivaMerchant\Enums\Environment;

        $viva = new VivaClient(
            merchantId: 'votre-merchant-uuid',
            apiKey: 'votre-api-key',
            clientId: 'xxx.apps.vivapayments.com',
            clientSecret: 'votre-client-secret',
            environment: 'demo', // string ou Environment enum
        );
        ```

        **Où trouver les identifiants ?**
        - `merchantId` + `apiKey` → Viva Dashboard > Settings > API Access
        - `clientId` + `clientSecret` → Viva Dashboard > Settings > API Access > OAuth Clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VivaClientConstructorParams'
      responses:
        '200':
          description: Instance `VivaClient` créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VivaClientInstance'

  /VivaClient/testConnection:
    post:
      tags: [VivaClient]
      operationId: VivaClient_testConnection
      summary: "$viva->testConnection()"
      description: |
        Teste la connexion en s'authentifiant et en récupérant les infos du compte.

        ```php
        if ($viva->testConnection()) {
            echo 'Connexion OK';
        } else {
            echo 'Échec de connexion';
        }
        ```
      parameters: []
      responses:
        '200':
          description: "`bool` — `true` si la connexion est réussie, `false` sinon"
          content:
            application/json:
              schema:
                type: boolean

  /VivaClient/invalidateToken:
    post:
      tags: [VivaClient]
      operationId: VivaClient_invalidateToken
      summary: "$viva->invalidateToken()"
      description: |
        Force la ré-authentification au prochain appel API. Utile si le token a été révoqué.

        ```php
        $viva->invalidateToken();
        // Le prochain appel API demandera un nouveau token OAuth2
        ```
      responses:
        '200':
          description: "`void` — Le token est invalidé"

  /VivaClient/getConfig:
    get:
      tags: [VivaClient]
      operationId: VivaClient_getConfig
      summary: "$viva->getConfig()"
      description: |
        Retourne l'objet `Config` pour introspection ou débogage.

        ```php
        $config = $viva->getConfig();
        echo $config->merchantId;
        echo $config->environment->value; // 'demo' ou 'production'
        echo $config->isProduction();     // bool
        echo $config->apiUrl();           // 'https://demo-api.vivapayments.com'
        echo $config->legacyUrl();        // 'https://demo.vivapayments.com'
        echo $config->checkoutUrl();      // 'https://demo.vivapayments.com/web/checkout'
        echo $config->accountsUrl();      // 'https://demo-accounts.vivapayments.com'
        ```
      responses:
        '200':
          description: Objet `Config`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'

  # ============================================================
  # Orders
  # ============================================================
  /Orders/create:
    post:
      tags: [Orders]
      operationId: Orders_create
      summary: "$viva->orders->create()"
      description: |
        Crée un ordre de paiement Smart Checkout. Le client est redirigé vers l'URL de checkout Viva pour finaliser le paiement.

        ```php
        $order = $viva->orders->create(
            amount: 1500,                         // 15,00 EUR (centimes)
            customerDescription: 'Consultation',  // Affiché au client
            merchantReference: 'session_123',     // Référence interne
            allowRecurring: true,                 // Tokeniser la carte
            preauth: false,                       // Pré-autorisation ?
            maxInstallments: 3,                   // Paiement en 3x
        );

        echo $order['order_code'];   // 1234567890
        echo $order['checkout_url']; // https://demo.vivapayments.com/web/checkout?ref=1234567890

        // Rediriger le client :
        header('Location: ' . $order['checkout_url']);
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersCreateParams'
      responses:
        '200':
          description: Ordre créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersCreateResult'
        '400':
          description: "`ApiException` — Erreur de création (montant invalide, source inconnue, etc.)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /Orders/get:
    get:
      tags: [Orders]
      operationId: Orders_get
      summary: "$viva->orders->get()"
      description: |
        Récupère le statut d'un ordre de paiement.

        ```php
        $order = $viva->orders->get(orderCode: 1234567890);

        echo $order['StateId'];       // 0 = en attente, 2 = payé
        echo $order['Amount'];        // 1500
        echo $order['PaymentId'];     // UUID de la transaction
        ```
      parameters:
        - name: orderCode
          in: query
          required: true
          schema:
            type: integer
          description: "Code de l'ordre (retourné par `create()`)"
      responses:
        '200':
          description: Données brutes de l'ordre Viva
          content:
            application/json:
              schema:
                type: object
                description: "array<string, mixed>"
        '400':
          description: "`ApiException`"

  /Orders/cancel:
    delete:
      tags: [Orders]
      operationId: Orders_cancel
      summary: "$viva->orders->cancel()"
      description: |
        Annule un ordre de paiement non payé.

        ```php
        $result = $viva->orders->cancel(orderCode: 1234567890);
        ```
      parameters:
        - name: orderCode
          in: query
          required: true
          schema:
            type: integer
          description: Code de l'ordre à annuler
      responses:
        '200':
          description: Ordre annulé
          content:
            application/json:
              schema:
                type: object
        '400':
          description: "`ApiException` — Ordre déjà payé ou introuvable"

  /Orders/checkoutUrl:
    get:
      tags: [Orders]
      operationId: Orders_checkoutUrl
      summary: "$viva->orders->checkoutUrl()"
      description: |
        Génère l'URL Smart Checkout pour un code d'ordre existant, sans appel API.

        ```php
        $url = $viva->orders->checkoutUrl(orderCode: 1234567890);
        // => 'https://demo.vivapayments.com/web/checkout?ref=1234567890'
        ```
      parameters:
        - name: orderCode
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: "`string` — URL de checkout"
          content:
            text/plain:
              schema:
                type: string
                example: "https://demo.vivapayments.com/web/checkout?ref=1234567890"

  # ============================================================
  # Transactions
  # ============================================================
  /Transactions/get:
    get:
      tags: [Transactions]
      operationId: Transactions_get
      summary: "$viva->transactions->get()"
      description: |
        Récupère les détails complets d'une transaction (Legacy API, réponse PascalCase).

        Inclut : Fee, Commission, Order, Payment, CreditCard, etc.

        ```php
        $txn = $viva->transactions->get('transaction-uuid');

        echo $txn['Transactions'][0]['Amount'];       // 1500
        echo $txn['Transactions'][0]['StatusId'];      // 'F'
        echo $txn['Transactions'][0]['CreditCard']['Number']; // '411111...1111'
        ```
      parameters:
        - name: transactionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: UUID de la transaction
      responses:
        '200':
          description: Données complètes de la transaction (PascalCase)
          content:
            application/json:
              schema:
                type: object
                description: "array<string, mixed>"
        '400':
          description: "`ApiException`"

  /Transactions/getV2:
    get:
      tags: [Transactions]
      operationId: Transactions_getV2
      summary: "$viva->transactions->getV2()"
      description: |
        Récupère les détails d'une transaction via la New API (Bearer, réponse camelCase).

        Réponse plus légère, recommandée pour vérifier les paiements Smart Checkout.

        ```php
        $txn = $viva->transactions->getV2('transaction-uuid');

        echo $txn['email'];             // 'client@example.com'
        echo $txn['amount'];            // 15.00 (attention : en EUR, pas en centimes)
        echo $txn['statusId'];          // 'F'
        echo $txn['orderCode'];         // 1234567890
        echo $txn['cardNumber'];        // '411111...1111'
        echo $txn['recurringSupport'];  // true/false
        ```
      parameters:
        - name: transactionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Données de la transaction (camelCase)
          content:
            application/json:
              schema:
                type: object
                description: "array<string, mixed>"

  /Transactions/listByDate:
    get:
      tags: [Transactions]
      operationId: Transactions_listByDate
      summary: "$viva->transactions->listByDate()"
      description: |
        Liste toutes les transactions d'une date donnée.

        ```php
        $transactions = $viva->transactions->listByDate('2026-03-18');

        foreach ($transactions as $txn) {
            echo $txn['TransactionId'] . ' — ' . $txn['Amount'] . "\n";
        }
        ```
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "Date au format `Y-m-d`"
      responses:
        '200':
          description: Liste de transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                description: "array<int, array<string, mixed>>"

  /Transactions/cancel:
    delete:
      tags: [Transactions]
      operationId: Transactions_cancel
      summary: "$viva->transactions->cancel()"
      description: |
        Annule ou rembourse une transaction.

        - Même jour → annulation (void)
        - Jour passé → remboursement (refund)

        ```php
        // Remboursement total
        $result = $viva->transactions->cancel('transaction-uuid');

        // Remboursement partiel (5,00 EUR)
        $result = $viva->transactions->cancel('transaction-uuid', amount: 500);

        echo $result['TransactionId']; // UUID de la transaction de remboursement
        ```
      parameters:
        - name: transactionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: UUID de la transaction à annuler/rembourser
        - name: amount
          in: query
          required: false
          schema:
            type: integer
            nullable: true
          description: "Montant en centimes (`null` = remboursement total)"
        - name: sourceCode
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Code de la source de paiement
      responses:
        '200':
          description: Transaction annulée/remboursée
          content:
            application/json:
              schema:
                type: object
                properties:
                  TransactionId:
                    type: string
                    description: UUID de la transaction de remboursement

  /Transactions/capture:
    post:
      tags: [Transactions]
      operationId: Transactions_capture
      summary: "$viva->transactions->capture()"
      description: |
        Capture une transaction pré-autorisée.

        ```php
        // Capture totale
        $result = $viva->transactions->capture('preauth-uuid', amount: 1500);

        // Capture partielle
        $result = $viva->transactions->capture('preauth-uuid', amount: 1000);
        ```
      parameters:
        - name: transactionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: UUID de la transaction pré-autorisée
        - name: amount
          in: query
          required: true
          schema:
            type: integer
          description: Montant en centimes à capturer
      responses:
        '200':
          description: Transaction capturée
          content:
            application/json:
              schema:
                type: object
        '400':
          description: "`ApiException` — Capture échouée"

  /Transactions/recurring:
    post:
      tags: [Transactions]
      operationId: Transactions_recurring
      summary: "$viva->transactions->recurring()"
      description: |
        Effectue un paiement récurrent en utilisant le token de la transaction initiale.

        Prérequis : l'ordre initial doit avoir été créé avec `allowRecurring: true`.

        ```php
        // Charge récurrente de 15,00 EUR
        $result = $viva->transactions->recurring(
            initialTransactionId: 'initial-txn-uuid',
            amount: 1500,
        );
        ```
      parameters:
        - name: initialTransactionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: UUID de la transaction initiale (avec carte tokenisée)
        - name: amount
          in: query
          required: true
          schema:
            type: integer
          description: Montant en centimes
        - name: sourceCode
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Code de la source de paiement
      responses:
        '200':
          description: Paiement récurrent effectué
          content:
            application/json:
              schema:
                type: object
        '400':
          description: "`ApiException` — Charge récurrente échouée"

  # ============================================================
  # Sources
  # ============================================================
  /Sources/list:
    get:
      tags: [Sources]
      operationId: Sources_list
      summary: "$viva->sources->list()"
      description: |
        Liste toutes les sources de paiement du marchand.

        ```php
        $sources = $viva->sources->list();

        foreach ($sources as $source) {
            echo $source['Name'] . ' — ' . $source['SourceCode'] . "\n";
        }
        ```
      responses:
        '200':
          description: Liste des sources de paiement
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                description: "array<int, array<string, mixed>>"

  /Sources/create:
    post:
      tags: [Sources]
      operationId: Sources_create
      summary: "$viva->sources->create()"
      description: |
        Crée une nouvelle source de paiement.

        ```php
        $source = $viva->sources->create(
            name: 'Mon site web',
            sourceCode: '1234',
            domain: 'www.example.com',
            pathSuccess: '/paiement/succes',
            pathFail: '/paiement/echec',
        );
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourcesCreateParams'
      responses:
        '200':
          description: Source créée
          content:
            application/json:
              schema:
                type: object

  # ============================================================
  # Wallets
  # ============================================================
  /Wallets/list:
    get:
      tags: [Wallets]
      operationId: Wallets_list
      summary: "$viva->wallets->list()"
      description: |
        Liste tous les portefeuilles du marchand (réponse basique).

        ```php
        $wallets = $viva->wallets->list();

        foreach ($wallets as $wallet) {
            echo $wallet['Available'] . ' ' . $wallet['CurrencyCode'] . "\n";
        }
        ```
      responses:
        '200':
          description: Liste des portefeuilles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /Wallets/balance:
    get:
      tags: [Wallets]
      operationId: Wallets_balance
      summary: "$viva->wallets->balance()"
      description: |
        Retourne le solde agrégé de tous les portefeuilles.

        ```php
        $balance = $viva->wallets->balance();

        echo $balance['available'];  // 150.50
        echo $balance['pending'];    // 25.00
        echo $balance['reserved'];   // 0.00
        echo $balance['currency'];   // 'EUR'
        ```
      responses:
        '200':
          description: Solde agrégé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'

  /Wallets/transfer:
    post:
      tags: [Wallets]
      operationId: Wallets_transfer
      summary: "$viva->wallets->transfer()"
      description: |
        Transfère de l'argent entre deux portefeuilles Viva.

        Prérequis : « Allow transfers between accounts » doit être activé dans Settings > API Access.

        ```php
        $result = $viva->wallets->transfer(
            amount: 5000,                        // 50,00 EUR
            sourceWalletId: 'source-uuid',
            targetWalletId: 'target-uuid',
            description: 'Transfert mensuel',
        );
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletTransferParams'
      responses:
        '200':
          description: Transfert effectué
          content:
            application/json:
              schema:
                type: object

  /Wallets/listDetailed:
    get:
      tags: [Wallets]
      operationId: Wallets_listDetailed
      summary: "$viva->wallets->listDetailed()"
      description: |
        Liste les portefeuilles avec des détails enrichis (IBAN, SWIFT, etc.).

        ```php
        $wallets = $viva->wallets->listDetailed();

        foreach ($wallets as $wallet) {
            echo $wallet['iban'] . ' — ' . $wallet['amount'] . "\n";
            echo $wallet['isPrimary'] ? 'Principal' : 'Secondaire';
        }
        ```
      responses:
        '200':
          description: Liste détaillée des portefeuilles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WalletDetailed'

  /Wallets/create:
    post:
      tags: [Wallets]
      operationId: Wallets_create
      summary: "$viva->wallets->create()"
      description: |
        Crée un nouveau portefeuille (sous-compte).

        ```php
        $wallet = $viva->wallets->create(
            friendlyName: 'Compte secondaire',
            currencyCode: 'EUR',
        );
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [friendlyName]
              properties:
                friendlyName:
                  type: string
                  description: Nom d'affichage du portefeuille
                currencyCode:
                  type: string
                  default: EUR
                  description: "Code ISO 4217 alpha (ex: `EUR`)"
      responses:
        '200':
          description: Portefeuille créé
          content:
            application/json:
              schema:
                type: object

  /Wallets/update:
    put:
      tags: [Wallets]
      operationId: Wallets_update
      summary: "$viva->wallets->update()"
      description: |
        Met à jour le nom d'un portefeuille.

        ```php
        $viva->wallets->update(
            walletId: 12345,
            friendlyName: 'Nouveau nom',
        );
        ```
      parameters:
        - name: walletId
          in: query
          required: true
          schema:
            type: integer
          description: ID du portefeuille
        - name: friendlyName
          in: query
          required: true
          schema:
            type: string
          description: Nouveau nom d'affichage
      responses:
        '200':
          description: Portefeuille mis à jour
          content:
            application/json:
              schema:
                type: object

  /Wallets/searchTransactions:
    get:
      tags: [Wallets]
      operationId: Wallets_searchTransactions
      summary: "$viva->wallets->searchTransactions()"
      description: |
        Recherche les transactions de compte (tous les portefeuilles).

        ```php
        $transactions = $viva->wallets->searchTransactions([
            'date_from' => '2026-03-01',
            'date_to' => '2026-03-18',
            'walletId' => 12345,
        ]);

        foreach ($transactions as $txn) {
            echo $txn['amount'] . "\n";
        }
        ```
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            type: object
            properties:
              date_from:
                type: string
                format: date
              date_to:
                type: string
                format: date
              walletId:
                type: integer
          description: "Filtres optionnels (`date_from`, `date_to`, `walletId`)"
      responses:
        '200':
          description: Liste de transactions de compte
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /Wallets/getTransaction:
    get:
      tags: [Wallets]
      operationId: Wallets_getTransaction
      summary: "$viva->wallets->getTransaction()"
      description: |
